<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>360p Light Recorder</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #00ff88; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { border: 2px solid #00ff88; padding: 20px; border-radius: 15px; text-align: center; background: #1a1a1a; box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        #timer { font-size: 3rem; margin-bottom: 20px; font-family: monospace; }
        button { padding: 15px 30px; font-size: 1rem; font-weight: bold; cursor: pointer; border-radius: 8px; border: none; transition: 0.2s; }
        #start { background: #00ff88; color: #000; }
        #stop { background: #ff4757; color: #fff; display: none; }
        .info { color: #888; margin-top: 15px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="box">
        <div style="font-size: 0.8rem; opacity: 0.7;">MOD: 360p Ultra-Light</div>
        <div id="timer">00:00:00</div>
        <button id="start">START SNIMANJE</button>
        <button id="stop">STOP & SAVE (.MP4)</button>
        <div class="info">8GB RAM siguran mod: Snimaj neograničeno!</div>
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        let startTime;
        let timerInterval;

        const startBtn = document.getElementById('start');
        const stopBtn = document.getElementById('stop');
        const timerDisplay = document.getElementById('timer');

        startBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { 
                        width: { ideal: 640 }, // 360p širina
                        height: { ideal: 360 }, // 360p visina
                        frameRate: { ideal: 30 } 
                    },
                    audio: true
                });

                // Postavka za mali fajl (1.5 Mbps je vrhunski za 360p)
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp9,opus',
                    videoBitsPerSecond: 1500000 
                });

                mediaRecorder.ondataavailable = e => e.data.size > 0 && recordedChunks.push(e.data);

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `video_360p_${Date.now()}.mp4`;
                    a.click();
                    
                    recordedChunks = [];
                    startBtn.style.display = 'inline-block';
                    stopBtn.style.display = 'none';
                    clearInterval(timerInterval);
                    timerDisplay.textContent = "00:00:00";
                };

                mediaRecorder.start(1000);
                startTime = Date.now();
                timerInterval = setInterval(() => {
                    const d = new Date(Date.now() - startTime);
                    timerDisplay.textContent = d.toISOString().substr(11, 8);
                }, 1000);

                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';

                stream.getVideoTracks()[0].onended = () => stopBtn.click();

            } catch (e) { alert("Greška: " + e.message); }
        };

        stopBtn.onclick = () => {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(t => t.stop());
        };
    </script>
</body>
</html>
